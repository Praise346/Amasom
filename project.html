<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width,initial-scale=1.0"/>

        <title>
            Health App
        </title>
        <link rel="stylesheet" href="healthbody files/healthbody.css">
        <link rel="stylesheet" href="healthbody files/healthside.css">
        <link rel="stylesheet" href="healthbody files/healthpreview.css">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" 
        rel="healthbody files/healthpreview.css">
        

    </head>
    <body>
        <div class="sidebar">
            <div class="sidebar-elements">
                <img src="home.svg">
            </div>
            <div class="sidebar-elements">
                <img src="bitcoin-symbol-coin-black-outline-18599.svg">
                
            </div>
            <div class="sidebar-elements">
                <img src="black-pie-chart-25-percent-15674.svg">
            </div>
            <div class="sidebar-elements">
                <img src="oil-price-3611.svg">
            </div>
            
        </div>
        <div class="activity">
            <h3>Activity Dashboard</h3>
        </div>
        
        <div class="shawn-exchange">
            <div class="card-header">
                <h3>
                    Shawn Exchange
                </h3>
            </div>
            <div class="chart-placeholder">Chart placeholder</div>
            <div class="trade-activity">
                <div>
                    <p class="value">Bit</p>
                    <p class="label">Currency</p>
                </div>
                <div>
                    <p class="value">USDT</p>
                    <p class="label">Currency2</p>
                </div>
                <div>
                    <p class="value">ETH</p>
                    <p class="label">Currency3</p>
                </div>

            </div>
        </div>
        <div class="right-sidebar">
            <div class="small-card">
                <h3>Trade-progress</h3>
            </div>
            <div class="small-cardpink">
                <h3>Crypto-rewards</h3>
            </div>
            <div class="small-cardxtra">
                <h3>Coin Wallet </h3>
            </div>
            <div class="small-cardxtra2">
                <h3>Gift Cards</h3>
            </div>
        </div>
        <div class="main-container">
            <div class="right-side">
                <div class="outer-circle purple-color">
                    <div class="inner-circle">
                        <h3>Trade Level</h3>
                        <p>32%</p>
                    </div>
                </div>
                <div class="outer-circle2 pink-color">
                    <div class="inner-circle2">
                        <h3>Shawn Level</h3>
                        <p>50%</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="progress-section">
            <div class="progress-card">
                <h4>City Explorer</h4>
                <div class="progress-bar">
                    <div class=""></div>
                        

                    </div>
                </div>
            </div>
        </div>
      

    </body>
</html>
